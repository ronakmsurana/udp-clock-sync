<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTLS Sync Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: #58a6ff; margin: 0 0 0.5rem 0; font-size: 2.5rem; }
        .metrics-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 800px;
        }
        .metric-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            flex: 1;
            text-align: center;
        }
        .metric-title { font-size: 0.9rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px;}
        .metric-value { font-size: 2rem; font-weight: bold; margin-top: 0.5rem; color: #2ea043; }
        .chart-container {
            width: 100%;
            max-width: 800px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1rem;
        }
        /* The Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 invisible columns to make math easy */
            gap: 20px;
            margin: 20px auto;
            max-width: 900px; /* Keeps the cards from stretching too far on wide screens */
        }

        /* Top row cards take up half the width (3 columns each) */
        .dashboard-grid .metric-card:nth-child(1),
        .dashboard-grid .metric-card:nth-child(2) {
            grid-column: span 3;
        }

        /* Bottom row cards take up a third of the width (2 columns each) */
        .dashboard-grid .metric-card:nth-child(3),
        .dashboard-grid .metric-card:nth-child(4),
        .dashboard-grid .metric-card:nth-child(5) {
            grid-column: span 2;
        }

        /* The Universal Card Style */
        .metric-card {
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); /* Adds a nice subtle shadow */
        }

        /* Text Styling */
        .metric-title {
            font-size: 16px;
            color: #8b949e;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 24px;
            font-family: monospace;
            font-weight: bold;
        }

        /* Specific Colors for the Numbers */
        .delay-color { color: #f0f6fc; }
        .offset-color { color: #58a6ff; }
        .server-color { color: #58a6ff; }
        .synced-color { color: #3fb950; }
        .diff-color { color: #d2a8ff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Distributed Clock Sync</h1>
        <p>Live DTLS Network Telemetry</p>
    </div>

    <div class="metrics-container">
        <div class="dashboard-grid">
            <div class="metric-card">
                <div class="metric-title">📡 Current Network Delay</div>
                <div class="metric-value delay-color" id="delayValue">Waiting...</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">⏱️ Current Clock Offset</div>
                <div class="metric-value offset-color" id="offsetValue">Waiting...</div>
            </div>

            <div class="metric-card">
                <div class="metric-title">🖥️ Server Time (T1)</div>
                <div class="metric-value server-color" id="serverTimeValue">Waiting...</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">⌚ My Synced Time</div>
                <div class="metric-value synced-color" id="syncedTimeValue">Waiting...</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">⚖️ Difference</div>
                <div class="metric-value diff-color" id="differenceValue">Waiting...</div>
            </div>
        </div>
    
    </div>
    </div>

    <div class="chart-container">
        <canvas id="driftChart"></canvas>
    </div>

    <div style="width: 100%; max-width: 800px; margin-top: 2rem; text-align: center;">
        <button id="stressBtn" style="padding: 12px 24px; font-size: 16px; background-color: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">
            ⚡ Run Concurrent Stress Test
        </button>
        
        <pre id="stressTerminal" style="margin-top: 15px; background-color: #010409; border: 1px solid #30363d; border-radius: 6px; padding: 15px; color: #8b949e; text-align: left; display: none; white-space: pre-wrap; font-family: monospace; font-size: 14px;"></pre>
    </div>

    <script>
        const socket = io();
        
        // Setup Chart.js
        const ctx = document.getElementById('driftChart').getContext('2d');
        const driftChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Time labels
                datasets: [{
                    label: 'Clock Drift Offset (Seconds)',
                    data: [],
                    borderColor: '#58a6ff',
                    backgroundColor: 'rgba(88, 166, 255, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4 // Smooth curves
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
                },
                plugins: {
                    legend: { labels: { color: '#c9d1d9' } }
                }
            }
        });

        // --- Helper function to format raw timestamps into a human clock ---
        function formatTime(timestamp) {
            // 1. Convert the Unix timestamp (seconds) to a JavaScript Date object (milliseconds)
            const date = new Date(timestamp * 1000);

            // 2. Extract the local hours, minutes, and seconds (padding with '0' if needed)
            const h = date.getHours().toString().padStart(2, '0');
            const m = date.getMinutes().toString().padStart(2, '0');
            const s = date.getSeconds().toString().padStart(2, '0');

            // 3. Extract the exact microsecond decimals from the raw double
            // (timestamp % 1) gets just the fractional part (e.g., 0.123456)
            // .substring(2) chops off the "0." part, leaving just the numbers
            const decimals = (timestamp % 1).toFixed(6).substring(2);

            // 4. Return the formatted string: HH:MM:SS.xxxxxx
            return `${h}:${m}:${s}.${decimals}`;
        }

        // Listen for live data from the C client via Node
        socket.on('sync_update', (data) => {
            // Update digital readouts
            document.getElementById('delayValue').innerText = data.delay.toFixed(6) + ' s';
            document.getElementById('offsetValue').innerText = data.offset.toFixed(6) + ' s';

            // --- NEW: Update the new time displays ---
            document.getElementById('serverTimeValue').innerText = formatTime(data.server_time);
            document.getElementById('syncedTimeValue').innerText = formatTime(data.synced_time);
            document.getElementById('differenceValue').innerText = data.difference.toFixed(8) + " s";
            
            // Add new data to the chart
            const now = new Date().toLocaleTimeString();
            driftChart.data.labels.push(now);
            driftChart.data.datasets[0].data.push(data.offset);

            // Keep the chart from getting too crowded (keep last 15 points)
            if (driftChart.data.labels.length > 20) {
                driftChart.data.labels.shift();
                driftChart.data.datasets[0].data.shift();
            }

            driftChart.update();
        });
        // Stress Test Logic ---
        const stressBtn = document.getElementById('stressBtn');
        const stressTerminal = document.getElementById('stressTerminal');

        stressBtn.addEventListener('click', () => {
            // Tell the Node backend to run the bash script
            socket.emit('start_stress_test');
            
            // Update UI to show loading state
            stressBtn.innerText = '⏳ Hammering Server... (Wait 3s)';
            stressBtn.style.backgroundColor = '#21262d';
            stressBtn.disabled = true;
            
            stressTerminal.style.display = 'block';
            stressTerminal.innerText = 'Spawning concurrent clients...\n\n';
        });

        // Listen for the results to come back from Node
        socket.on('stress_result', (response) => {
            // Reset button
            stressBtn.innerText = '⚡ Run Concurrent Stress Test';
            stressBtn.style.backgroundColor = '#238636';
            stressBtn.disabled = false;

            // Print the bash script output to our web terminal
            if (response.status === 'success') {
                stressTerminal.innerText += response.data;
                // Highlight the metrics in green
                stressTerminal.style.color = '#3fb950'; 
            } else {
                stressTerminal.innerText += "ERROR:\n" + response.data;
                stressTerminal.style.color = '#f85149';
            }
        });
    </script>
</body>
</html>
